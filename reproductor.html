<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0e0e12;
  --surface:#18181f;
  --surface2:#22222c;
  --border:rgba(255,255,255,.07);
  --accent:#b8f542;
  --accent2:#42f5c8;
  --text:#f2f0e8;
  --muted:#60607a;
  --muted2:#3a3a50;
  --danger:#f54242;
}

body{
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:20px 16px;
}

.app{width:100%;max-width:460px;display:flex;flex-direction:column;gap:14px}

.player-card{
  background:var(--surface);border-radius:20px;
  border:1px solid var(--border);padding:24px;
  position:relative;overflow:hidden;
}
.player-card::after{
  content:'';position:absolute;top:-80px;right:-80px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(184,245,66,.1) 0%,transparent 70%);
  pointer-events:none;
}

.artwork{
  width:100%;aspect-ratio:1;border-radius:14px;
  background:linear-gradient(145deg,#1c1c28,#0e0e15);
  margin-bottom:20px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;border:1px solid var(--border);
}
.artwork-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;border-radius:14px}
.artwork-placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:.18}
.artwork-placeholder svg{width:56px;height:56px}

.eq{position:absolute;bottom:12px;right:12px;display:flex;align-items:flex-end;gap:3px;height:22px;opacity:0;transition:opacity .3s}
.eq.on{opacity:1}
.eq-b{width:4px;background:var(--accent);border-radius:2px}
.eq.on .eq-b:nth-child(1){animation:e1 .7s ease-in-out infinite alternate}
.eq.on .eq-b:nth-child(2){animation:e2 .9s ease-in-out infinite alternate}
.eq.on .eq-b:nth-child(3){animation:e3 .6s ease-in-out infinite alternate}
.eq.on .eq-b:nth-child(4){animation:e4 1s  ease-in-out infinite alternate}
@keyframes e1{from{height:5px}to{height:18px}}
@keyframes e2{from{height:12px}to{height:5px}}
@keyframes e3{from{height:7px}to{height:20px}}
@keyframes e4{from{height:16px}to{height:6px}}

.now-title{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;
  line-height:1.2;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.now-artist{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:20px}

.bar-wrap{height:5px;background:var(--surface2);border-radius:99px;cursor:pointer;margin-bottom:6px;position:relative}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .18s linear;pointer-events:none}
.bar-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:13px;height:13px;border-radius:50%;background:var(--accent);left:0%;
  opacity:0;transition:opacity .2s,left .18s linear;pointer-events:none;
  box-shadow:0 0 6px rgba(184,245,66,.5);
}
.bar-wrap:hover .bar-thumb{opacity:1}
.times{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:22px;font-variant-numeric:tabular-nums}

.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.btn{
  background:none;border:none;cursor:pointer;color:var(--muted);
  padding:8px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  transition:color .18s,transform .12s,background .18s;
}
.btn:hover{color:var(--text);background:rgba(255,255,255,.06);transform:scale(1.1)}
.btn.active{color:var(--accent)}
.btn svg{width:20px;height:20px}
.btn-play{width:54px;height:54px;border-radius:50%;background:var(--accent);color:#0e0e12}
.btn-play svg{width:22px;height:22px}
.btn-play:hover{color:#0e0e12;background:var(--accent);transform:scale(1.08)}
.btn-play.spinning{animation:pulse 2s ease-out infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(184,245,66,.4)}
  70%{box-shadow:0 0 0 10px rgba(184,245,66,0)}
  100%{box-shadow:0 0 0 0 rgba(184,245,66,0)}
}

.vol-row{display:flex;align-items:center;gap:10px}
.vol-row svg{width:16px;height:16px;flex-shrink:0;color:var(--muted)}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;background:var(--surface2);border-radius:99px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--text);cursor:pointer;transition:background .18s}
input[type=range]:hover::-webkit-slider-thumb{background:var(--accent)}

.playlist-card{background:var(--surface);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.pl-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.pl-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px}
.pl-count{font-family:'DM Sans',sans-serif;font-weight:300;font-size:.75rem;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:99px}
.btn-clear{font-size:.72rem;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:8px;background:none;cursor:pointer;transition:color .18s,border-color .18s}
.btn-clear:hover{color:var(--danger);border-color:var(--danger)}

.pl-list{max-height:260px;overflow-y:auto}
.pl-list::-webkit-scrollbar{width:4px}
.pl-list::-webkit-scrollbar-track{background:transparent}
.pl-list::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:99px}

.pl-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);position:relative}
.pl-item:last-child{border-bottom:none}
.pl-item:hover{background:rgba(255,255,255,.03)}
.pl-item.active{background:rgba(184,245,66,.06)}
.pl-num{font-size:.72rem;color:var(--muted);min-width:18px;text-align:center;font-variant-numeric:tabular-nums}
.pl-item.active .pl-num{color:var(--accent)}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-sub{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-item.active .pl-name{color:var(--accent)}
.pl-del{opacity:0;transition:opacity .15s;color:var(--muted);padding:4px;border-radius:6px;background:none;border:none;cursor:pointer}
.pl-del:hover{color:var(--danger)}
.pl-item:hover .pl-del{opacity:1}
.pl-del svg{width:14px;height:14px}
.pl-empty{padding:36px 20px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}

.add-card{background:var(--surface);border-radius:20px;border:1px solid var(--border);padding:18px 20px}
.add-label{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.field-row{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.field-row input{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:.82rem;
  color:var(--text);outline:none;transition:border-color .18s;
}
.field-row input::placeholder{color:var(--muted)}
.field-row input:focus{border-color:rgba(184,245,66,.4)}
.btn-add{
  width:100%;padding:10px;border-radius:10px;background:var(--accent);border:none;
  font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;color:#0e0e12;
  cursor:pointer;transition:opacity .18s,transform .12s;
}
.btn-add:hover{opacity:.88;transform:scale(1.01)}
.btn-add:active{transform:scale(.98)}

.divider{display:flex;align-items:center;gap:8px;margin:12px 0}
.divider span{font-size:.7rem;color:var(--muted)}
.divider hr{flex:1;border:none;border-top:1px solid var(--border)}

.upload-zone{
  border:1.5px dashed rgba(184,245,66,.2);border-radius:10px;padding:12px;
  text-align:center;cursor:pointer;transition:border-color .18s,background .18s;
  font-size:.78rem;color:var(--muted);display:block;
}
.upload-zone:hover{border-color:var(--accent);background:rgba(184,245,66,.04);color:var(--accent)}
.upload-zone input{display:none}
.upload-zone small{display:block;margin-top:3px;font-size:.68rem;opacity:.55}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--surface);border:1px solid var(--border);padding:10px 18px;
  border-radius:10px;font-size:.82rem;color:var(--text);transition:transform .3s ease;
  z-index:999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

<div class="player-card">
  <div class="artwork" id="artworkBox">
    <div class="artwork-placeholder" id="artPlaceholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <img id="artworkImg" class="artwork-img" alt="">
    <div class="eq" id="eq">
      <div class="eq-b"></div><div class="eq-b"></div>
      <div class="eq-b"></div><div class="eq-b"></div>
    </div>
  </div>
  <div class="now-title" id="nowTitle">Sin canción</div>
  <div class="now-artist" id="nowArtist">Agrega canciones a la lista</div>
  <div class="bar-wrap" id="barWrap">
    <div class="bar-fill" id="barFill"></div>
    <div class="bar-thumb" id="barThumb"></div>
  </div>
  <div class="times"><span id="tCur">0:00</span><span id="tDur">0:00</span></div>
  <div class="controls">
    <button class="btn" id="btnShuffle" title="Aleatorio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        <line x1="4" y1="4" x2="9" y2="9"/>
      </svg>
    </button>
    <button class="btn" id="btnPrev" title="Anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
      </svg>
    </button>
    <button class="btn btn-play" id="btnPlay">
      <svg id="iPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg id="iPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="btn" id="btnNext" title="Siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
    <button class="btn" id="btnRepeat" title="Repetir">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
  </div>
  <div class="vol-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<div class="playlist-card">
  <div class="pl-header">
    <div class="pl-title">
      Lista de reproducción
      <span class="pl-count" id="plCount">0 canciones</span>
    </div>
    <button class="btn-clear" id="btnClear">Borrar todo</button>
  </div>
  <div class="pl-list" id="plList">
    <div class="pl-empty">Cargando...</div>
  </div>
</div>

<div class="add-card">
  <div class="add-label">Agregar canción</div>
  <div class="field-row">
    <input type="text" id="inTitle" placeholder="Título de la canción">
    <input type="text" id="inArtist" placeholder="Artista (opcional)">
    <input type="text" id="inUrl" placeholder="URL directa del audio (MP3, OGG…)">
    <input type="text" id="inArt" placeholder="URL de la carátula (opcional)">
  </div>
  <button class="btn-add" id="btnAdd">+ Agregar a la lista</button>
  <div class="divider"><hr><span>o</span><hr></div>
  <label class="upload-zone">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 4px;display:block">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Subir archivo de audio
    <small>MP3 · WAV · OGG · FLAC</small>
    <input type="file" id="fileIn" accept="audio/*" multiple>
  </label>
</div>

</div>
<div class="toast" id="toast"></div>
<audio id="audio" preload="auto"></audio>

<script>
// ══════════════════════════════════════════════
// CANCIONES PREDETERMINADAS
// Para agregar más, copia el bloque { } y pégalo
// separado por coma. La URL debe terminar en ?download=1
// ══════════════════════════════════════════════
const DEFAULT_SONGS = [
  {
    title: "Ya No Hay Verano",
    artist: "Depresión Sonora",
    url: "https://raw.githubusercontent.com/fendixa/MUSICA/main/Depresi%C3%B3n%20Sonora%20-%20Ya%20No%20Hay%20Verano%20(SPOTISAVER).mp3",
    art: ""
  }
  // Agrega más canciones aquí:
  // ,{
  //   title: "Nombre de la canción",
  //   artist: "Artista",
  //   url: "https://tu-link-onedrive?download=1",
  //   art: ""
  // }
];

const STORAGE_KEY = 'myplayer_playlist_v1';

const audio      = document.getElementById('audio');
const btnPlay    = document.getElementById('btnPlay');
const iPlay      = document.getElementById('iPlay');
const iPause     = document.getElementById('iPause');
const barFill    = document.getElementById('barFill');
const barThumb   = document.getElementById('barThumb');
const barWrap    = document.getElementById('barWrap');
const tCur       = document.getElementById('tCur');
const tDur       = document.getElementById('tDur');
const volSlider  = document.getElementById('vol');
const nowTitle   = document.getElementById('nowTitle');
const nowArtist  = document.getElementById('nowArtist');
const artImg     = document.getElementById('artworkImg');
const artPlaceholder = document.getElementById('artPlaceholder');
const eq         = document.getElementById('eq');
const plList     = document.getElementById('plList');
const plCount    = document.getElementById('plCount');
const btnShuffle = document.getElementById('btnShuffle');
const btnRepeat  = document.getElementById('btnRepeat');
const btnPrev    = document.getElementById('btnPrev');
const btnNext    = document.getElementById('btnNext');
const btnClear   = document.getElementById('btnClear');
const btnAdd     = document.getElementById('btnAdd');
const inTitle    = document.getElementById('inTitle');
const inArtist   = document.getElementById('inArtist');
const inUrl      = document.getElementById('inUrl');
const inArt      = document.getElementById('inArt');
const fileIn     = document.getElementById('fileIn');
const toastEl    = document.getElementById('toast');

let playlist = [];
let currentIdx = -1;
let shuffle = false;
let repeatMode = 'none';
let shuffleOrder = [];

function fmt(s){
  if(!isFinite(s)||isNaN(s)) return '0:00';
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'),2500);
}

function save(){
  const clean=playlist.filter(s=>!s.isBlob).map(s=>({title:s.title,artist:s.artist,url:s.url,art:s.art}));
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(clean)); }catch(e){}
}

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const saved=JSON.parse(raw);
      if(saved && saved.length>0){
        playlist=saved;
        renderPlaylist();
        buildShuffleOrder();
        return;
      }
    }
  }catch(e){}
  // Sin datos guardados → cargar canciones por defecto
  playlist=[...DEFAULT_SONGS];
  save();
  renderPlaylist();
  buildShuffleOrder();
}

function addSong(song){
  playlist.push(song);
  if(!song.isBlob) save();
  renderPlaylist();
  buildShuffleOrder();
  if(playlist.length===1) playSong(0);
}

function removeSong(idx){
  if(idx<currentIdx) currentIdx--;
  else if(idx===currentIdx){ audio.pause(); currentIdx=-1; }
  playlist.splice(idx,1);
  save();
  renderPlaylist();
  buildShuffleOrder();
  if(currentIdx>=playlist.length) currentIdx=playlist.length-1;
  if(currentIdx>=0) updateActive();
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function renderPlaylist(){
  plCount.textContent=`${playlist.length} canción${playlist.length!==1?'es':''}`;
  if(playlist.length===0){
    plList.innerHTML=`<div class="pl-empty">Aún no hay canciones.<br>Agrega una URL o sube un archivo abajo.</div>`;
    return;
  }
  plList.innerHTML=playlist.map((s,i)=>`
    <div class="pl-item${i===currentIdx?' active':''}" data-i="${i}">
      <span class="pl-num">${i+1}</span>
      <div class="pl-info">
        <div class="pl-name">${esc(s.title)}</div>
        <div class="pl-sub">${esc(s.artist||'—')}</div>
      </div>
      <button class="btn pl-del" data-d="${i}" title="Quitar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  `).join('');
  plList.querySelectorAll('.pl-item').forEach(el=>{
    el.addEventListener('click',e=>{ if(e.target.closest('.pl-del')) return; playSong(+el.dataset.i); });
  });
  plList.querySelectorAll('.pl-del').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); removeSong(+el.dataset.d); });
  });
}

function updateActive(){
  plList.querySelectorAll('.pl-item').forEach((el,i)=>{
    el.classList.toggle('active',i===currentIdx);
    el.querySelector('.pl-num').style.color=i===currentIdx?'var(--accent)':'';
    el.querySelector('.pl-name').style.color=i===currentIdx?'var(--accent)':'';
  });
  const active=plList.querySelector('.pl-item.active');
  if(active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function playSong(idx){
  if(idx<0||idx>=playlist.length) return;
  currentIdx=idx;
  const s=playlist[idx];
  audio.src=s.url;
  nowTitle.textContent=s.title||'Sin título';
  nowArtist.textContent=s.artist||'';
  if(s.art){ artImg.src=s.art; artImg.style.display='block'; artPlaceholder.style.display='none'; }
  else{ artImg.style.display='none'; artPlaceholder.style.display='flex'; }
  audio.load();
  audio.play().catch(()=>{});
  updateActive();
}

function buildShuffleOrder(){
  shuffleOrder=[...playlist.keys()].sort(()=>Math.random()-.5);
}

function nextSong(){
  if(playlist.length===0) return;
  if(repeatMode==='one'){ audio.currentTime=0; audio.play(); return; }
  if(shuffle){
    let i=shuffleOrder.indexOf(currentIdx);
    playSong(shuffleOrder[(i+1)%shuffleOrder.length]);
  } else {
    if(currentIdx+1<playlist.length) playSong(currentIdx+1);
    else if(repeatMode==='all') playSong(0);
  }
}

function prevSong(){
  if(playlist.length===0) return;
  if(audio.currentTime>3){ audio.currentTime=0; return; }
  if(shuffle){
    let i=shuffleOrder.indexOf(currentIdx);
    playSong(shuffleOrder[(i-1+shuffleOrder.length)%shuffleOrder.length]);
  } else {
    playSong(Math.max(0,currentIdx-1));
  }
}

btnPlay.addEventListener('click',()=>{ if(!audio.src) return; audio.paused?audio.play():audio.pause(); });
btnNext.addEventListener('click',nextSong);
btnPrev.addEventListener('click',prevSong);

btnShuffle.addEventListener('click',()=>{
  shuffle=!shuffle;
  btnShuffle.classList.toggle('active',shuffle);
  if(shuffle) buildShuffleOrder();
  showToast(shuffle?'Aleatorio activado':'Aleatorio desactivado');
});

btnRepeat.addEventListener('click',()=>{
  if(repeatMode==='none'){repeatMode='all';showToast('Repetir lista');}
  else if(repeatMode==='all'){repeatMode='one';showToast('Repetir canción');}
  else{repeatMode='none';showToast('Sin repetición');}
  btnRepeat.classList.toggle('active',repeatMode!=='none');
  btnRepeat.querySelector('svg').style.opacity=repeatMode==='one'?.5:1;
});

function setPlaying(on){
  iPlay.style.display=on?'none':'block';
  iPause.style.display=on?'block':'none';
  btnPlay.classList.toggle('spinning',on);
  eq.classList.toggle('on',on);
}

audio.addEventListener('play',()=>setPlaying(true));
audio.addEventListener('pause',()=>setPlaying(false));
audio.addEventListener('ended',nextSong);
audio.addEventListener('timeupdate',()=>{
  const p=audio.duration?(audio.currentTime/audio.duration)*100:0;
  barFill.style.width=p+'%';
  barThumb.style.left=p+'%';
  tCur.textContent=fmt(audio.currentTime);
  tDur.textContent=fmt(audio.duration);
});

barWrap.addEventListener('click',e=>{
  if(!audio.duration) return;
  const r=barWrap.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});

volSlider.addEventListener('input',()=>{ audio.volume=+volSlider.value; });

btnAdd.addEventListener('click',()=>{
  const url=inUrl.value.trim();
  if(!url){ showToast('Pega una URL de audio'); return; }
  const title=inTitle.value.trim()||url.split('/').pop().replace(/\?.*$/,'').replace(/\.[^.]+$/,'');
  const artist=inArtist.value.trim()||'';
  const art=inArt.value.trim()||'';
  addSong({title,artist,url,art});
  inTitle.value=''; inArtist.value=''; inUrl.value=''; inArt.value='';
  showToast(`"${title}" agregada`);
});

[inTitle,inArtist,inUrl,inArt].forEach(inp=>{
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') btnAdd.click(); });
});

fileIn.addEventListener('change',e=>{
  [...e.target.files].forEach(file=>{
    const url=URL.createObjectURL(file);
    const raw=file.name.replace(/\.[^.]+$/,'');
    const parts=raw.split(' - ');
    const title=parts.length>1?parts[1]:parts[0];
    const artist=parts.length>1?parts[0]:'';
    addSong({title,artist,url,art:'',isBlob:true});
    showToast(`"${title}" agregada (solo esta sesión)`);
  });
  e.target.value='';
});

btnClear.addEventListener('click',()=>{
  if(!playlist.length) return;
  if(!confirm('¿Borrar toda la lista?')) return;
  audio.pause(); currentIdx=-1; playlist=[];
  save(); renderPlaylist();
  nowTitle.textContent='Sin canción';
  nowArtist.textContent='Agrega canciones a la lista';
  artImg.style.display='none';
  artPlaceholder.style.display='flex';
  setPlaying(false);
});

document.querySelector('.upload-zone').addEventListener('dragover',e=>e.preventDefault());
document.querySelector('.upload-zone').addEventListener('drop',e=>{
  e.preventDefault();
  [...e.dataTransfer.files].filter(f=>f.type.startsWith('audio/')).forEach(file=>{
    const url=URL.createObjectURL(file);
    const raw=file.name.replace(/\.[^.]+$/,'');
    const parts=raw.split(' - ');
    addSong({title:parts[1]||parts[0],artist:parts[0]||'',url,art:'',isBlob:true});
  });
});

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.key===' '){ e.preventDefault(); btnPlay.click(); }
  if(e.key==='ArrowRight') nextSong();
  if(e.key==='ArrowLeft') prevSong();
});

buildShuffleOrder();
load();
</script>
</body>
</html>
